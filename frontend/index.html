<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkillPulse</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h1>🚀 SkillPulse</h1>

    <!-- Add Skill -->
    <div class="card">
        <h2>Add New Skill</h2>
        <div class="form">
            <input id="name" placeholder="Skill name" />
            <input id="category" placeholder="Category" />
            <input id="target_hours" type="number" placeholder="Target hours" />
            <button onclick="addSkill()">Add Skill</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="card">
        <h2>Dashboard</h2>
        <div id="dashboard" class="dashboard"></div>
    </div>

    <!-- Skills -->
    <div class="card">
        <h2>Your Skills</h2>
        <div id="skills" class="skills"></div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
